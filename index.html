<!doctype html>
<html lang="de">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Tischwahl - The Sichuan</title>
    <link rel="stylesheet" href="./styles.css?v=4" />
  </head>
  <body>
    <main class="app-shell">
      <header class="topbar">
        <div>
          <p class="eyebrow">The Sichuan</p>
          <h1>Tischwahl</h1>
        </div>
        <div class="room-badge" aria-label="Abstimmungsraum">
          <span>Raum</span>
          <strong id="roomCode">tischwahl</strong>
          <small id="syncStatus">Lokal</small>
        </div>
      </header>

      <section class="share-panel" aria-label="Abstimmung teilen">
        <label class="name-field">
          <span>Dein Name</span>
          <input id="voterName" type="text" autocomplete="name" placeholder="z. B. Sarah" />
        </label>
        <label class="share-field">
          <span>Link für die Gruppe</span>
          <input id="shareLink" type="text" readonly />
        </label>
        <button id="copyLinkButton" class="secondary-button" type="button">Link kopieren</button>
        <button id="newRoomButton" class="secondary-button" type="button">Neuer Raum</button>
      </section>

      <section class="toolbar" aria-label="Menü filtern">
        <label class="search-field">
          <span>Gericht suchen</span>
          <input id="searchInput" type="search" placeholder="z. B. Huhn, Tofu, scharf" />
        </label>
        <label class="select-field">
          <span>Kategorie</span>
          <select id="sectionFilter"></select>
        </label>
        <label class="select-field">
          <span>Ansicht</span>
          <select id="viewFilter">
            <option value="all">Alle Gerichte</option>
            <option value="selected">Meine Auswahl</option>
            <option value="popular">Mit Stimmen</option>
          </select>
        </label>
        <div class="selection-counter">
          <span id="voteCounter">0</span>
          <small>gewählt</small>
        </div>
      </section>

      <section class="content-grid">
        <section class="menu-panel" aria-label="Speisekarte">
          <div class="section-heading">
            <div>
              <p class="eyebrow">Speisekarte</p>
              <h2 id="menuHeading">177 Gerichte</h2>
            </div>
            <button id="clearMyVotesButton" class="secondary-button compact" type="button">Meine Auswahl leeren</button>
          </div>
          <div id="menuList" class="menu-list"></div>
        </section>

        <aside class="results-panel" aria-label="Ergebnis">
          <div class="section-heading">
            <div>
              <p class="eyebrow">Live Ergebnis</p>
              <h2>Favoriten der Gruppe</h2>
            </div>
            <button id="resetButton" class="icon-button" type="button" title="Alle Stimmen zurücksetzen" aria-label="Alle Stimmen zurücksetzen">
              ↺
            </button>
          </div>
          <div id="resultsList" class="results-list"></div>
          <div class="order-box">
            <p class="eyebrow">Bestellvorschlag</p>
            <div id="orderSummary" class="order-summary"></div>
          </div>
        </aside>
      </section>
    </main>

    <div id="toast" class="toast" role="status" aria-live="polite"></div>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="./menu-data.js?v=4"></script>
    <script src="./app.js?v=4"></script>
  </body>
</html>
