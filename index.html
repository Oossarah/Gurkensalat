<!doctype html>
<html lang="de">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Gurkensalat - The Sichuan</title>
    <link rel="stylesheet" href="./styles.css?v=43" />
  </head>
  <body>
    <main class="app-shell">
      <nav class="sticky-nav" aria-label="Schnellnavigation">
        <a href="#menuSection">Speisekarte</a>
        <a href="#resultsSection">Ergebnisse</a>
        <a href="#settingsSection">Einstellungen</a>
      </nav>

      <section class="toolbar" aria-label="Menü filtern">
        <label class="search-field">
          <span>Gericht suchen</span>
          <input id="searchInput" type="search" placeholder="z. B. Huhn, Tofu, scharf" />
        </label>
        <label class="select-field">
          <span>Kategorie</span>
          <select id="sectionFilter"></select>
        </label>
        <label class="select-field">
          <span>Ansicht</span>
          <select id="viewFilter">
            <option value="all">Alle Gerichte</option>
            <option value="selected">Meine Auswahl</option>
            <option value="popular">Mit Stimmen</option>
          </select>
        </label>
        <div class="selection-counter">
          <span id="voteCounter">0</span>
          <small>gewählt</small>
        </div>
      </section>

      <section class="content-grid">
        <section id="menuSection" class="menu-panel" aria-label="Speisekarte">
          <div class="section-heading">
            <div>
              <p class="eyebrow">Speisekarte</p>
              <h2 id="menuHeading">177 Gerichte</h2>
            </div>
          </div>
          <div id="menuList" class="menu-groups"></div>
        </section>

        <aside id="resultsSection" class="results-panel" aria-label="Ergebnis">
          <div class="section-heading">
            <div>
              <p class="eyebrow">Live Ergebnis</p>
              <h2>Favoriten der Gruppe</h2>
            </div>
          </div>
          <div id="resultsList" class="results-list"></div>
          <div class="order-box">
            <p class="eyebrow">Bestellvorschlag</p>
            <div id="orderSummary" class="order-summary"></div>
          </div>
        </aside>
      </section>

      <section id="settingsSection" class="settings-panel" aria-label="Einstellungen">
        <div class="section-heading">
          <div>
            <p class="eyebrow">Einstellungen</p>
            <h2>Gruppe und Abstimmung</h2>
          </div>
        </div>
        <div class="settings-grid">
          <label class="share-field">
            <span>Username festlegen</span>
            <input id="voterName" type="text" autocomplete="username" placeholder="z. B. dimsumlord3" />
          </label>
          <label class="share-field">
            <span>Link für die Gruppe</span>
            <input id="shareLink" type="text" readonly />
          </label>
          <div class="room-status" aria-label="Raum und Verbindung">
            <span id="roomCode">gurkensalat</span>
            <small id="syncStatus">Lokal</small>
            <small id="syncDetail">Noch nicht verbunden</small>
          </div>
          <button id="copyLinkButton" class="secondary-button" type="button">Link kopieren</button>
          <button id="newRoomButton" class="secondary-button" type="button">Neuer Raum</button>
          <button id="clearMyVotesButton" class="secondary-button" type="button">Meine Auswahl leeren</button>
          <button id="resetButton" class="secondary-button danger-button" type="button">Alle Stimmen zurücksetzen</button>
        </div>
      </section>
    </main>

    <div id="toast" class="toast" role="status" aria-live="polite"></div>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="./menu-data.js?v=43"></script>
    <script src="./app.js?v=43"></script>
  </body>
</html>
